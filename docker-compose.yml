services:

  api:
    build: .

    container_name: pokemon_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis

    volumes:
      - .:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload


  redis:
    image: redis:7-alpine

    container_name: redis_pokemon

    ports:
      - "6379:6379"
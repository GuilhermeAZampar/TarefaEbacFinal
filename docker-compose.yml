services:

  api:
    build: .

    container_name: pokemon_api

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - redis
      - db

    volumes:
      - .:/app

    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload


  db:
    image: postgres:16-alpine

    container_name: postgres_pokemon

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: pokedb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine

    container_name: redis_pokemon

    ports:
      - "6379:6379"


volumes:
  postgres_data: